<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">

  <title>해운대나눔과행복병원 진료 안내 가이드</title>
  
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar" aria-label="주요 메뉴">
    <div class="nav-inner">
      <div class="brand-logo-area">
        <a class="brand-logo" href="https://www.snh.or.kr/main/main.php" target="_blank" rel="noopener noreferrer" aria-label="해운대나눔과행복병원 홈페이지 열기">
          <div class="nav-logo-icon">H</div>
          <span><strong>진료 안내 가이드</strong></span>
        </a>
        <button id="themeToggle" class="theme-toggle-btn" aria-label="다크 모드 토글" title="테마 변경 (라이트/다크)">
          <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="M4.93 4.93l1.41 1.41"/><path d="M17.66 17.66l1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="M6.34 17.66l-1.41 1.41"/><path d="M19.07 4.93l-1.41 1.41"/></svg>
          <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <header class="hero">
    <div class="hero-content" id="top">
      <p class="hero-badge">HAEUNDAE NANUM & HAPPINESS HOSPITAL</p>
      <h1>해운대나눔과행복병원<br><span>진료 정보 허브</span></h1>
      <p class="hero-copy">의료진 진료 일정, 검사·시술 수가, 원무 안내 및 주요 내선번호를 신속하게 조회할 수 있습니다.</p>
      <div class="search-shell">
        <label class="sr-only" for="globalSearch">통합 검색</label>
        <span class="search-icon" aria-hidden="true">⌕</span>
        <input id="globalSearch" type="search" placeholder="예: 박미경, 내시경, 농협, HIRA" autocomplete="off">
        <button id="clearSearch" type="button" aria-label="검색어 지우기">×</button>
      </div>
      <div class="quick-links" aria-label="빠른 이동">
        <button type="button" data-view="schedule">진료 시간표</button>
        <button type="button" data-view="services">검사·시술 비용</button>
        <button type="button" data-view="staff">직원·지인 금액</button>
        <button type="button" data-view="contact">연락처</button>
        <button type="button" data-view="extensions">내선번호</button>
        <button type="button" data-view="organization">기관정보</button>
        <button type="button" data-view="sites">자주 들어가는 사이트</button>
        <button type="button" data-view="favorites" class="fav-quick-btn">★ 즐겨찾기</button>
      </div>
    </div>
  </header>

  <main>
    <section class="summary" aria-label="안내 요약">
      <article><strong id="doctorCount">16</strong><span>의료진</span></article>
      <article><strong id="serviceCount">45</strong><span>비용 항목</span></article>
      <article><strong>월–토</strong><span>주간 시간표</span></article>
    </section>

    <section class="workspace" id="guide">
      <div class="section-heading">
        <div>
          <h2 id="viewTitle">진료 시간표</h2>
        </div>
        <div class="view-tabs" role="tablist" aria-label="안내 종류">
          <button class="active" type="button" data-view="schedule" role="tab">시간표</button>
          <button type="button" data-view="services" role="tab">비용</button>
          <button type="button" data-view="staff" role="tab">직원가</button>
          <button type="button" data-view="contact" role="tab">연락처</button>
          <button type="button" data-view="extensions" role="tab">내선번호</button>
          <button type="button" data-view="organization" role="tab">기관정보</button>
          <button type="button" data-view="sites" role="tab">자주 가는 사이트</button>
          <button type="button" data-view="favorites" role="tab">★ 즐겨찾기</button>
        </div>
      </div>

      <div id="extensionSearchBar" class="extension-search-bar" hidden>
        <label for="extensionSearch">내선번호(연락처) 검색</label>
        <div>
          <span aria-hidden="true">⌕</span>
          <input id="extensionSearch" type="search" placeholder="부서명, 이름, 내선번호를 입력하세요" autocomplete="off">
          <button id="clearExtensionSearch" type="button" aria-label="내선번호 검색어 지우기">×</button>
        </div>
      </div>
      <div id="filterBar" class="filter-bar" aria-label="목록 필터"></div>
      <div id="resultMeta" class="result-meta" aria-live="polite"></div>
      <div id="content" class="content-grid"></div>
      <div id="emptyState" class="empty-state" hidden>
        <span>⌕</span>
        <h3>검색 결과가 없습니다</h3>
        <p>이름이나 항목을 조금 짧게 입력해 보세요.</p>
      </div>
    </section>

  </main>

  <footer class="hospital-footer">
    <div class="hospital-footer-inner">
      <span class="hospital-emblem" aria-hidden="true">H</span>
      <div>
        <p>의료법인 나눔과행복의료재단</p>
        <strong>해운대·나눔과행복병원</strong>
      </div>
    </div>
  </footer>

  <button id="scrollTop" class="scroll-top-btn" aria-label="맨 위로 이동" title="맨 위로 이동">↑</button>
  <div id="toastContainer"></div>

  <script src="app.js"></script>
</body>
</html>
